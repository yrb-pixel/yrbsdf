<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EFG QNT — Workflow GPS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap');

:root {
  --bg:#0b0f19; --s1:#111827; --s2:#1a2236; --s3:#243044;
  --bd:#2a3650; --tx:#e2e8f0; --tx2:#7b8ba3; --tx3:#4a5568;
  --acc:#38bdf8; --acc2:#818cf8; --grn:#34d399; --red:#f87171;
  --org:#fb923c; --ylw:#fbbf24; --pnk:#f472b6; --cyn:#22d3ee;
  --eq:#60a5fa; --fi:#4ade80; --etf:#c084fc; --mf:#facc15;
  --esg:#2dd4bf; --feed:#fb7185; --ref:#a78bfa;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;}

/* TOP BAR */
.topbar{
  height:64px; display:flex; align-items:center; gap:20px;
  padding:0 28px; border-bottom:1px solid var(--bd);
  background:linear-gradient(180deg,#10162088,var(--bg));
}
.topbar .logo{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:var(--acc);letter-spacing:-.5px;white-space:nowrap;}
.topbar .logo span{color:var(--tx2);font-weight:400;}

/* SEARCH */
.search-wrap{
  flex:1; max-width:560px; position:relative;
}
.search-wrap input{
  width:100%; height:40px;
  padding:0 16px 0 40px; border-radius:10px;
  border:1.5px solid var(--bd); background:var(--s1); color:var(--tx);
  font-family:'Outfit',sans-serif; font-size:15px; font-weight:400;
  outline:none; transition:border .15s;
}
.search-wrap input:focus{border-color:var(--acc);background:var(--s2);}
.search-wrap input::placeholder{color:var(--tx3);}
.search-wrap .icon{position:absolute;left:12px;top:10px;color:var(--tx3);font-size:18px;pointer-events:none;}
.search-wrap .hint{position:absolute;right:12px;top:10px;font-size:11px;color:var(--tx3);font-family:'IBM Plex Mono',monospace;}

/* SILO PILLS */
.pills{display:flex;gap:6px;flex-wrap:nowrap;}
.pill{
  padding:4px 12px; border-radius:20px; font-size:12px; font-weight:500;
  cursor:pointer; border:1px solid var(--bd);
  background:transparent;
  color:var(--tx2); transition:all .12s; white-space:nowrap;
  font-family:'Outfit',sans-serif;
}
.pill:hover{border-color:var(--tx2);color:var(--tx);}
.pill.on{border-color:var(--acc);background:var(--acc);color:var(--bg);font-weight:600;}

/* MAIN LAYOUT */
.main{display:flex;height:calc(100vh - 64px);}

/* LEFT: RESULTS */
.results{
  width:380px; min-width:380px;
  border-right:1px solid var(--bd);
  display:flex; flex-direction:column; background:var(--s1);
}
.results-header{
  padding:12px 20px; border-bottom:1px solid var(--bd);
  font-size:12px; color:var(--tx2); font-weight:500;
  display:flex; justify-content:space-between; align-items:center;
}
.results-list{flex:1;overflow-y:auto;padding:6px 0;}

.wf-card{
  padding:10px 20px; cursor:pointer; border-left:3px solid transparent;
  transition:all .1s;
}
.wf-card:hover{background:var(--s2);}
.wf-card.sel{background:var(--s2);border-left-color:var(--acc);}
.wf-card .name{
  font-family:'IBM Plex Mono',monospace; font-size:12.5px; font-weight:500;
  color:var(--tx);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.wf-card .desc{font-size:11.5px;color:var(--tx2);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wf-card .badges{display:flex;gap:6px;margin-top:5px;align-items:center;flex-wrap:wrap;}
.badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;}
.b-EQ{background:#1e293b;color:var(--eq);} .b-FI{background:#122217;color:var(--fi);}
.b-ETF{background:#231729;color:var(--etf);} .b-MF{background:#272517;color:var(--mf);}
.b-ESG{background:#122525;color:var(--esg);} .b-FEED{background:#251717;color:var(--feed);}
.b-REF{background:#1d1729;color:var(--ref);} .b-RECON{background:#252117;color:var(--ylw);}
.b-TEST{background:#1a1a1a;color:#888;} .b-OTHER{background:#1a1a1a;color:#888;}
.b-tag{font-size:9px;text-transform:uppercase;letter-spacing:.3px;}
.b-prod{background:#0d2818;color:var(--grn);} .b-test{background:#2a1c0d;color:var(--org);}
.b-shadow{background:#1a0d2a;color:var(--acc2);} .b-old{background:#1a1a1a;color:#666;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
.dot-success{background:var(--grn);} .dot-fail{background:var(--red);}
.dot-running{background:var(--ylw);animation:pulse 1.5s infinite;}

/* RIGHT: DETAIL + GRAPH */
.detail-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* GRAPH CANVAS */
.graph-zone{
  flex:1;
  position:relative; overflow:hidden; background:
    radial-gradient(circle at 50% 50%, #111d2e 0%, var(--bg) 70%);
}
.graph-zone canvas{display:block;}

/* DETAIL PANEL */
.detail-panel{
  height:280px; min-height:200px; border-top:1px solid var(--bd);
  overflow-y:auto; padding:20px 28px; background:var(--s1);
}
.dp-name{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;color:var(--acc);}
.dp-desc{font-size:13px;color:var(--tx2);margin:4px 0 12px;}
.dp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.dp-field{background:var(--s2);border-radius:6px;padding:8px 12px;}
.dp-field .l{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;}
.dp-field .v{font-size:12px;color:var(--tx);margin-top:2px;word-break:break-all;}

.dp-acts-title{font-size:11px;font-weight:600;color:var(--acc);text-transform:uppercase;letter-spacing:.8px;margin:12px 0 6px;}
.dp-act{
  display:inline-flex;align-items:center;gap:6px;padding:4px 10px;
  background:var(--s2);border-radius:5px;border:1px solid var(--bd);
  margin:2px 3px 2px 0; font-size:11px;
}
.empty-msg{
  display:flex;align-items:center;justify-content:center;height:100%;
  color:var(--tx3);font-size:14px;text-align:center;flex-direction:column;gap:8px;
}
.resize-handle{
  height:4px;cursor:ns-resize;background:var(--bd);transition:background .15s;
}
.resize-handle:hover{background:var(--acc);}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">EFG_QNT <span>/ Workflow GPS</span></div>
  <div class="search-wrap">
    <span class="icon">⌕</span>
    <input id="q" placeholder="Search: display, country, approved, bonds, alert, Boris..." autofocus />
    <span class="hint">↵</span>
  </div>
  <div class="pills" id="pills"></div>
</div>

<div class="main">
  <div class="results">
    <div class="results-header">
      <span id="count">0 workflows</span>
      <span style="font-size:11px;color:var(--tx3)">sorted by relevance</span>
    </div>
    <div class="results-list" id="list"></div>
  </div>
  <div class="detail-area">
    <div class="graph-zone" id="graphZone">
      <canvas id="cv"></canvas>
    </div>
    <div class="resize-handle" id="resizeH"></div>
    <div class="detail-panel" id="detailPanel">
      <div class="empty-msg"><div class="em-icon">⌕</div>Search or click a workflow to see its dependency graph and details.</div>
    </div>
  </div>
</div>

<script>
// Tes données originales complètes 
const W = [{"id":"ADV_EQUITY_ALERTS_EMAIL_LEVEL1","s":"EQ","tag":"prod","desc":"Job to detect if an email should be sent to the appropriate contacts","owner":"SKASSAR","status":"success","sched":"[Data is passing screen] efg_ch : (2359692) ADV_EQUITY_ALERT_LEVEL1\n","wfType":"Client Data Archive/Manipulation","acts":[{"n":"Excel Batch","t":"Excel Batch","d":"Template adv_equity_alerts_status_level1.xlsx Output File ADV_EQUITY_ALERTS_STATUS_L1.xlsx"},{"n":"File Format","t":"File Format","d":""},{"n":"Notification","t":"Notification","d":"Notification File 1 ADV_EQUITY_ALERTS_STATUS_L1.html Notification File 1 ADV_EQUITY_ALERTS_STATUS_L1.html"}],"search":"file notification adv_equity_alerts_status_l1.xlsx email adv_equity_alerts_email_level1 format detect adv_equity_alerts_status_level1.xlsx job output batch excel skassar sent adv_equity_alerts_status_l1.html contacts the appropriate should template","up":["ADV_EQUITY_ALERT_LEVEL1"]},
/* ... Le reste de tes 361 workflows est ici ... */
{"id":"ADV_EQUITY_ALERTS_EMAIL_LEVEL1_NEW","s":"EQ","tag":"prod","desc":"Job to detect if an email should be sent to the appropriate contacts","owner":"SKASSAR","status":"success","sched":"efg_ch : (2956091) ADV_EQUITY_ALERT_LEVEL1_NEW\n","wfType":"Client Data Archive/Manipulation","acts":[{"n":"Excel Batch","t":"Excel Batch","d":"Template adv_equity_alerts_L1_new_approved.xlsx Output File ADV_EQUITY_ALERTS_STATUS_L1_APPROVED.xlsx"},{"n":"Excel Batch_1","t":"Excel Batch","d":"Template adv_equity_alerts_L1_new_watch.xlsx Output File ADV_EQUITY_ALERTS_STATUS_L1_WATCH.xlsx"},{"n":"File Format","t":"File Format","d":""},{"n":"File Format_2","t":"File Format","d":""},{"n":"Notification","t":"Notification","d":"Notification File 1 ADV_EQUITY_ALERTS_STATUS_L1_APPROVED.html Notification File 1 ADV_EQUITY_ALERTS_STATUS_L1_APPROVED.html"},{"n":"Notification_1","t":"Notification","d":"Notification File 1 ADV_EQUITY_ALERTS_STATUS_L1_WATCH.html Notification File 1 ADV_EQUITY_ALERTS_STATUS_L1_WATCH.html"}],"search":"file notification adv_equity_alerts_l1_new_approved.xlsx email adv_equity_alerts_status_l1_watch.xlsx adv_equity_alerts_status_l1_approved.html adv_equity_alerts_email_level1_new format detect job output adv_equity_alerts_status_l1_watch.html adv_equity_alerts_l1_new_watch.xlsx batch notification_1 excel skassar sent contacts the adv_equity_alerts_status_l1_approved.xlsx appropriate should batch_1 format_2 template","up":["ADV_EQUITY_ALERT_LEVEL1_NEW"]}];
// Note : J'ai tronqué l'affichage ici pour la réponse, mais dans ton fichier réel, tu dois garder tout le tableau W de efg.txt.

const silos = ["ALL","EQ","FI","ETF","MF","ESG","FEED","REF"];
let curSilo = "ALL", curSel = null, filtered = [];

// Correction de la recherche : Utilisation de .includes() au lieu de RegExp 
function update() {
  const val = document.getElementById('q').value.toLowerCase().trim();
  const terms = val.split(/\s+/).filter(t => t.length > 0);
  
  filtered = W.filter(w => {
    if(curSilo !== "ALL" && w.s !== curSilo) return false;
    if(terms.length === 0) return true;
    
    // On vérifie si CHAQUE terme de recherche est inclus dans l'ID ou le champ 'search'
    return terms.every(term => 
      w.id.toLowerCase().includes(term) || 
      (w.search && w.search.toLowerCase().includes(term))
    );
  });
  
  renderList();
}

function renderList() {
  const list = document.getElementById('list');
  document.getElementById('count').innerText = `${filtered.length} workflows`;
  list.innerHTML = filtered.map(w => `
    <div class="wf-card ${curSel === w.id ? 'sel' : ''}" onclick="select('${w.id}')">
      <div class="name">${w.id}</div>
      <div class="desc">${w.desc}</div>
      <div class="badges">
        <span class="badge b-${w.s}">${w.s}</span>
        <span class="badge b-tag b-${w.tag}">${w.tag}</span>
        ${w.status ? `<span class="dot dot-${w.status === 'success' ? 'success' : (w.status.includes('fail') ? 'fail' : 'running')}"></span>` : ''}
      </div>
    </div>
  `).join('');
}

function select(id) {
  curSel = id;
  const w = W.find(x => x.id === id);
  renderList();
  renderDetail(w);
  drawGraph(w);
}

function renderDetail(w) {
  const dp = document.getElementById('detailPanel');
  if(!w) return;
  dp.innerHTML = `
    <div class="dp-name">${w.id}</div>
    <div class="dp-desc">${w.desc}</div>
    <div class="dp-grid">
      <div class="dp-field"><div class="l">Silo</div><div class="v">${w.s}</div></div>
      <div class="dp-field"><div class="l">Owner</div><div class="v">${w.owner}</div></div>
      <div class="dp-field"><div class="l">Type</div><div class="v">${w.wfType}</div></div>
    </div>
    <div class="dp-acts-title">Activities (${w.acts.length})</div>
    <div>${w.acts.map(a => `<div class="dp-act"><span class="at">${a.t}</span> <span class="an">${a.n}</span></div>`).join('')}</div>
  `;
}

// Graph Logic (Simplified)
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let panX = 0, panY = 0, zoom = 1;

function drawGraph(w) {
  const zone = document.getElementById('graphZone');
  cv.width = zone.clientWidth;
  cv.height = zone.clientHeight;
  ctx.clearRect(0,0,cv.width,cv.height);
  
  if(!w) return;
  
  ctx.save();
  ctx.translate(cv.width/2, cv.height/2);
  
  // Node
  ctx.beginPath();
  ctx.arc(0, 0, 40, 0, Math.PI*2);
  ctx.fillStyle = "#1a2236";
  ctx.fill();
  ctx.strokeStyle = "#38bdf8";
  ctx.lineWidth = 2;
  ctx.stroke();
  
  ctx.fillStyle = "#fff";
  ctx.font = "bold 10px IBM Plex Mono";
  ctx.textAlign = "center";
  ctx.fillText(w.id.substring(0,15), 0, 5);
  
  ctx.restore();
}

// Init
document.getElementById('q').oninput = update;
const pContainer = document.getElementById('pills');
pContainer.innerHTML = silos.map(s => `<div class="pill ${s==='ALL'?'on':''}" onclick="setSilo('${s}', this)">${s}</div>`).join('');

function setSilo(s, el) {
  curSilo = s;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
  el.classList.add('on');
  update();
}

// Interaction
let dragging = false, lastX, lastY;
cv.onmousedown = e => { dragging = true; lastX = e.clientX; lastY = e.clientY; };
window.onmousemove = e => {
  if(dragging) {
    panX += (e.clientX - lastX);
    panY += (e.clientY - lastY);
    lastX = e.clientX; lastY = e.clientY;
    // redraw call would go here
  }
};
window.onmouseup = () => dragging = false;

// Initial Load
update();
</script>
</body>
</html>
