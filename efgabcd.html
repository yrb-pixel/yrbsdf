<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EFG QNT — Workflow GPS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap');

:root {
  --bg:#0b0f19; --s1:#111827; --s2:#1a2236; --s3:#243044;
  --bd:#2a3650; --tx:#e2e8f0; --tx2:#7b8ba3; --tx3:#4a5568;
  --acc:#38bdf8; --acc2:#818cf8; --grn:#34d399; --red:#f87171;
  --org:#fb923c; --ylw:#fbbf24; --pnk:#f472b6; --cyn:#22d3ee;
  --eq:#60a5fa; --fi:#4ade80; --etf:#c084fc; --mf:#facc15;
  --esg:#2dd4bf; --feed:#fb7185; --ref:#a78bfa; --recon:#fbbf24;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;}

.topbar{
  height:64px; display:flex; align-items:center; gap:20px;
  padding:0 28px; border-bottom:1px solid var(--bd);
  background:linear-gradient(180deg,#10162088,var(--bg));
}
.topbar .logo{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:var(--acc);letter-spacing:-.5px;white-space:nowrap;}
.topbar .logo span{color:var(--tx2);font-weight:400;}

.search-wrap{flex:1;max-width:560px;position:relative;}
.search-wrap input{
  width:100%;height:40px;padding:0 16px 0 40px;border-radius:10px;
  border:1.5px solid var(--bd);background:var(--s1);color:var(--tx);
  font-family:'Outfit',sans-serif;font-size:15px;font-weight:400;
  outline:none;transition:border .15s;
}
.search-wrap input:focus{border-color:var(--acc);background:var(--s2);}
.search-wrap input::placeholder{color:var(--tx3);}
.search-wrap .icon{position:absolute;left:12px;top:10px;color:var(--tx3);font-size:18px;pointer-events:none;}
.search-wrap .hint{position:absolute;right:12px;top:10px;font-size:11px;color:var(--tx3);font-family:'IBM Plex Mono',monospace;}

/* OR mode indicator */
.or-badge{
  display:none;position:absolute;right:32px;top:9px;
  font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;
  background:rgba(251,146,60,.15);color:var(--org);border:1px solid rgba(251,146,60,.3);
  font-family:'IBM Plex Mono',monospace;
}
.or-badge.visible{display:block;}

.pills{display:flex;gap:6px;flex-wrap:nowrap;}
.pill{
  padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;
  cursor:pointer;border:1px solid var(--bd);background:transparent;
  color:var(--tx2);transition:all .12s;white-space:nowrap;
  font-family:'Outfit',sans-serif;
}
.pill:hover{border-color:var(--tx2);color:var(--tx);}
.pill.on{border-color:var(--acc);background:var(--acc);color:var(--bg);font-weight:600;}

.main{display:flex;height:calc(100vh - 64px);}

.results{
  width:380px;min-width:380px;border-right:1px solid var(--bd);
  display:flex;flex-direction:column;background:var(--s1);
}
.results-header{
  padding:12px 20px;border-bottom:1px solid var(--bd);
  font-size:12px;color:var(--tx2);font-weight:500;
  display:flex;justify-content:space-between;align-items:center;
}
.results-list{flex:1;overflow-y:auto;padding:6px 0;}

.wf-card{
  padding:10px 20px;cursor:pointer;border-left:3px solid transparent;
  transition:all .1s;
}
.wf-card:hover{background:var(--s2);}
.wf-card.sel{background:var(--s2);border-left-color:var(--acc);}
.wf-card .name{
  font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:500;
  color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.wf-card .desc{font-size:11.5px;color:var(--tx2);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wf-card .badges{display:flex;gap:6px;margin-top:5px;align-items:center;flex-wrap:wrap;}
.badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;}
.b-EQ{background:#1e293b;color:var(--eq);} .b-FI{background:#122217;color:var(--fi);}
.b-ETF{background:#231729;color:var(--etf);} .b-MF{background:#272517;color:var(--mf);}
.b-ESG{background:#122525;color:var(--esg);} .b-FEED{background:#251717;color:var(--feed);}
.b-REF{background:#1d1729;color:var(--ref);} .b-RECON{background:#252117;color:var(--ylw);}
.b-TEST{background:#1a1a1a;color:#888;} .b-OTHER{background:#1a1a1a;color:#888;}
.b-tag{font-size:9px;text-transform:uppercase;letter-spacing:.3px;}
.b-prod{background:#0d2818;color:var(--grn);} .b-test{background:#2a1c0d;color:var(--org);}
.b-shadow{background:#1a0d2a;color:var(--acc2);} .b-old{background:#1a1a1a;color:#666;}

.match-hl{background:rgba(56,189,248,.2);color:var(--acc);border-radius:2px;padding:0 1px;}

.detail-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}

.graph-zone{
  flex:1;position:relative;overflow:hidden;background:
    radial-gradient(circle at 50% 50%, #111d2e 0%, var(--bg) 70%);
}
.graph-zone canvas{display:block;}

/* Graph legend */
.graph-legend{
  position:absolute;bottom:28px;left:16px;
  display:flex;gap:14px;align-items:center;
  font-size:10px;color:var(--tx3);font-family:'IBM Plex Mono',monospace;
  pointer-events:none;
}
.gl-item{display:flex;align-items:center;gap:5px;}
.gl-dot{width:8px;height:8px;border-radius:50%;}

.detail-panel{
  height:300px;min-height:160px;border-top:1px solid var(--bd);
  overflow-y:auto;padding:20px 28px;background:var(--s1);
}
.dp-name{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;color:var(--acc);}
.dp-desc{font-size:13px;color:var(--tx2);margin:4px 0 12px;}
.dp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.dp-field{background:var(--s2);border-radius:6px;padding:8px 12px;}
.dp-field .l{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;}
.dp-field .v{font-size:12px;color:var(--tx);margin-top:2px;word-break:break-all;}
.dp-field .v code{font-family:'IBM Plex Mono',monospace;font-size:11px;}

.dp-acts-title{font-size:11px;font-weight:600;color:var(--acc);text-transform:uppercase;letter-spacing:.8px;margin:12px 0 6px;}
.dp-act{
  display:inline-flex;align-items:center;gap:6px;padding:4px 10px;
  background:var(--s2);border-radius:5px;border:1px solid var(--bd);
  margin:2px 3px 2px 0;font-size:11px;
}
.dp-act .at{color:var(--cyn);font-weight:500;}
.dp-act .an{color:var(--tx2);font-family:'IBM Plex Mono',monospace;font-size:10px;}

/* Excel meta pills */
.pill-col{
  display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;
  background:var(--s3);color:var(--tx2);margin:2px 2px 2px 0;
}
.pill-fql{
  display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;
  background:rgba(34,211,238,.08);color:var(--cyn);border:1px solid rgba(34,211,238,.2);
  margin:2px 2px 2px 0;font-family:'IBM Plex Mono',monospace;
}
.pill-ofdb{
  display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;
  background:rgba(129,140,248,.08);color:var(--acc2);border:1px solid rgba(129,140,248,.2);
  margin:2px 2px 2px 0;font-family:'IBM Plex Mono',monospace;font-size:9px;
}

.empty-msg{
  display:flex;align-items:center;justify-content:center;height:100%;
  color:var(--tx3);font-size:14px;text-align:center;flex-direction:column;gap:8px;
}
.empty-msg .em-icon{font-size:40px;opacity:.3;}

.resize-handle{height:4px;cursor:ns-resize;background:var(--bd);transition:background .15s;}
.resize-handle:hover{background:var(--acc);}
  /* Toggle switch for formula display */
.formula-toggle {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--tx2);
  margin-left: 12px;
  cursor: pointer;
  user-select: none;
}
.formula-toggle input {
  width: 32px;
  height: 16px;
  appearance: none;
  background: var(--s3);
  border-radius: 8px;
  position: relative;
  cursor: pointer;
  transition: background .2s;
}
.formula-toggle input:checked {
  background: var(--acc);
}
.formula-toggle input::before {
  content: '';
  position: absolute;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--tx);
  top: 2px;
  left: 2px;
  transition: transform .2s;
}
.formula-toggle input:checked::before {
  transform: translateX(16px);
}

/* Formula display styles */
.pill-col.expanded {
  display: block;
  max-width: 100%;
  white-space: normal;
  word-break: break-all;
  margin: 4px 0;
  padding: 6px 10px;
  background: var(--s2);
  border-left: 2px solid var(--cyn);
}
.pill-col.expanded .formula-full {
  display: block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--tx3);
  margin-top: 4px;
  line-height: 1.4;
}

</style>
</head>
<body>

<div class="topbar">
  <div class="logo">EFG_QNT <span>/ Workflow GPS</span></div>
  <div class="search-wrap">
    <span class="icon">⌕</span>
    <input id="q" placeholder="Search: display, country | delta, risk | country..." autofocus />
    <span class="or-badge" id="orBadge">OR</span>
    <span class="hint">↵</span>
  </div>
  <div class="pills" id="pills"></div>
</div>

<div class="main">
  <div class="results">
    <div class="results-header">
      <span id="count">— workflows</span>
      <span style="font-size:11px;color:var(--tx3)" id="modeLabel">AND mode</span>
    </div>
    <div class="results-list" id="list"></div>
  </div>
  <div class="detail-area">
    <div class="graph-zone" id="graphZone">
      <canvas id="cv"></canvas>
      <div class="graph-legend" id="graphLegend" style="display:none">
        <div class="gl-item"><div class="gl-dot" style="background:#60a5fa;opacity:.5"></div>Upstream</div>
        <div class="gl-item"><div class="gl-dot" style="background:#fff"></div>Selected</div>
        <div class="gl-item"><div class="gl-dot" style="background:#34d399;opacity:.7"></div>Downstream</div>
        <div class="gl-item" style="margin-left:8px;color:var(--tx3)">scroll=zoom · drag=pan · click=navigate</div>
      </div>
    </div>
    <div class="resize-handle" id="resizeH"></div>
    <div class="detail-panel" id="detailPanel">
      <div class="empty-msg"><div class="em-icon">⌕</div>Search or click a workflow to see its dependency graph and details.</div>
    </div>
  </div>
</div>

<script src="excel_meta.js"></script>
<script src="workflows.js"></script>
<script>

// Enrich search with EXCEL_META
W.forEach(w => {
  w.acts.forEach(a => {
    if (a.t !== "Excel Batch" || !a.d) return;
    const match = a.d.match(/Template\s+([\w./:$#-]+)/i);
    if (!match) return;
    const tplKey = match[1].split('/').pop().toUpperCase();
    const meta = EXCEL_META[tplKey];
    if (!meta) return;
    const extra = [...(meta.cols||[]),...(meta.funcs||[]),...(meta.ofdb||[]),...(meta.vars||[])].join(' ').toLowerCase();
    w.search += ' ' + extra;
  });
});

const IDX = {}; W.forEach((w,i) => IDX[w.id]=i);
const SILO = {EQ:'Equity',FI:'Fixed Income',ETF:'ETF',MF:'Mutual Funds',ESG:'ESG',FEED:'Data Feeds',REF:'Reference',RECON:'Recon',TEST:'Test',OTHER:'Other'};
const SCOL = {EQ:'#60a5fa',FI:'#4ade80',ETF:'#c084fc',MF:'#facc15',ESG:'#2dd4bf',FEED:'#fb7185',REF:'#a78bfa',RECON:'#fbbf24',TEST:'#666',OTHER:'#666'};

// Graph directional colors
const GCOL_UP   = '#60a5fa'; // upstream  — cool blue
const GCOL_SEL  = '#ffffff'; // selected  — white
const GCOL_DOWN = '#34d399'; // downstream — green

let sel = null, siloF = null, qStr = '';

// Pills
const pillsEl = document.getElementById('pills');
const siloCounts = {};
W.forEach(w => siloCounts[w.s]=(siloCounts[w.s]||0)+1);
let ph = '<button class="pill on" data-s="all">All</button>';
Object.entries(siloCounts).sort((a,b)=>b[1]-a[1]).forEach(([s,c])=>{
  ph += `<button class="pill" data-s="${s}">${SILO[s]||s} ${c}</button>`;
});
pillsEl.innerHTML = ph;
pillsEl.onclick = e => {
  const b=e.target.closest('.pill'); if(!b) return;
  siloF = b.dataset.s==='all'?null:b.dataset.s;
  pillsEl.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
  b.classList.add('on');
  renderList();
};

// Search — AND by default, | for OR groups
const qEl = document.getElementById('q');
const orBadge = document.getElementById('orBadge');
const modeLabel = document.getElementById('modeLabel');

qEl.oninput = () => { qStr = qEl.value.trim().toLowerCase(); renderList(); };

function parseQuery(raw) {
  // Split on | to get OR groups; each group is AND terms
  const groups = raw.split('|').map(g => g.trim().split(/\s+/).filter(t=>t.length>=2));
  const isOR = groups.length > 1;
  orBadge.classList.toggle('visible', isOR);
  modeLabel.textContent = isOR ? 'OR mode' : 'AND mode';
  return { groups, isOR };
}

function matchesQuery(w, groups, isOR) {
  if (groups.length === 0 || groups.every(g=>g.length===0)) return true;
  const check = g => g.every(t => w.search.includes(t));
  return isOR ? groups.some(check) : groups.every(g => check(g));
}

function score(w, groups, isOR) {
  const terms = groups.flat();
  if(!terms.length) return w.tag==='prod' ? 1 : 0;
  let s = 0;
  const id = w.id.toLowerCase(), desc = (w.desc||'').toLowerCase();
  for(const t of terms) {
    if(id.includes(t)) s += 10;
    if(desc.includes(t)) s += 5;
    if(w.search.includes(t)) s += 2;
  }
  if(w.tag==='prod') s += .5;
  return s;
}

function renderList() {
  const el = document.getElementById('list');
  const { groups, isOR } = parseQuery(qStr);
  const terms = groups.flat();

  let filtered = W.filter(w => {
    if(siloF && w.s!==siloF) return false;
    return matchesQuery(w, groups, isOR);
  });
  filtered.sort((a,b) => score(b,groups,isOR) - score(a,groups,isOR));
  document.getElementById('count').textContent = filtered.length + ' workflows';

  el.innerHTML = filtered.slice(0,120).map(w => {
    let name = w.id, desc = w.desc||'';
    if(terms.length) {
      for(const t of terms) {
        const re = new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
        name = name.replace(re,'<span class="match-hl">$1</span>');
        desc = desc.replace(re,'<span class="match-hl">$1</span>');
      }
    }
    const depCount = (w.up||[]).length + (w.down||[]).length;
    return `<div class="wf-card ${sel===w.id?'sel':''}" data-id="${w.id}">
      <div class="name">${name}</div>
      <div class="desc">${desc||'—'}</div>
      <div class="badges">
        <span class="badge b-${w.s}">${SILO[w.s]||w.s}</span>
        <span class="badge b-tag b-${w.tag}">${w.tag}</span>
        ${depCount?`<span style="font-size:10px;color:var(--tx3)">⛓ ${depCount}</span>`:''}
        <span style="font-size:10px;color:var(--tx3)">${w.acts.length} steps</span>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('list').onclick = e => {
  const c = e.target.closest('.wf-card'); if(!c) return;
  selectWf(c.dataset.id);
};

function selectWf(id) {
  sel = id;
  renderList();
  renderDetail(id);
  renderGraph(id);
}

// Detail panel
function renderDetail(id) {
  const dp = document.getElementById('detailPanel');
  const w = W[IDX[id]]; if(!w) return;

  // Build Excel meta section
  const xlMeta = w.acts
    .filter(a => a.t === 'Excel Batch' && a.d)
    .map(a => {
      const match = a.d.match(/Template\s+([\w./:$#-]+)/i);
      if(!match) return null;
      const key = match[1].split('/').pop().toUpperCase();
      return EXCEL_META[key] ? {key, meta: EXCEL_META[key]} : null;
    })
    .filter(Boolean);

const xlHtml = xlMeta.length ? `
  <div style="display: flex; align-items: center; margin-top: 16px;">
    <div class="dp-acts-title" style="margin: 0;">📊 Excel Batch File</div>
    <label class="formula-toggle">
      <input type="checkbox" id="formulaToggle">
      <span>Show full formulas</span>
    </label>
  </div>
` + xlMeta.map(({key, meta}) => {
    const colMap = meta.col_map || {};

    // Columns: show each col pill with its FQL badge if available
    const colsHtml = meta.cols.map(c => {
      const mapped = colMap[c];
      const fqlBadge = mapped && mapped.fql
        ? `<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(34,211,238,.12);color:var(--cyn);margin-left:4px;font-family:'IBM Plex Mono',monospace;vertical-align:middle">${mapped.fql}</span>`
        : '';
      const formula = mapped && mapped.formula 
        ? mapped.formula.replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        : '';
      const formulaHtml = formula
        ? `<span class="formula-full" style="display:none;">${formula}</span>`
        : '';
      
      return `<span class="pill-col" data-col="${c}">${c}${fqlBadge}${formulaHtml}</span>`;
    }).join('');

    // OFDB paths (unchanged)
    const ofdbHtml = meta.ofdb.length ? `
      <div style="margin-top:8px">
        <div style="font-size:10px;color:var(--acc2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">OFDB Paths</div>
        <div>${meta.ofdb.map(o=>`<span class="pill-ofdb">${o}</span>`).join('')}</div>
      </div>` : '';

    return `
      <div style="margin-top:12px;">
        <div style="font-size:11px;color:var(--acc);font-weight:600;margin-bottom:6px;">
          ${key}
          <span style="font-weight:400;color:var(--tx3);font-size:10px;margin-left:8px">${meta.cols.length} columns · ${Object.keys(colMap).length} mapped · ${meta.ofdb.length} OFDB paths</span>
        </div>
        <div style="font-size:10px;color:var(--tx3);margin-bottom:6px;font-style:italic">
          Toggle above to show/hide full formulas · cyan badge = FQL function
        </div>
        <div class="cols-container" style="margin-bottom:6px">${colsHtml}</div>
        ${ofdbHtml}
      </div>
    `;
  }).join('') : '';


  dp.innerHTML = `
    <div class="dp-name">${w.id}</div>
    <div class="dp-desc">${w.desc||'No description'}</div>
    <div class="dp-grid" style="grid-template-columns:1fr 1fr;gap:12px 24px;margin-bottom:16px">
      <div class="dp-field">
        <div class="l">Schedule / Trigger</div>
        <div class="v"><code>${(w.sched||'—').trim()}</code></div>
      </div>
      <div class="dp-field">
        <div class="l">Dependencies</div>
        <div class="v">${(w.up||[]).length} up · ${(w.down||[]).length} down</div>
      </div>
    </div>

    <div class="dp-acts-title">Pipeline — ${w.acts.length} steps</div>
    <div>${w.acts.map((a,i)=>`<span class="dp-act"><span style="color:var(--tx3)">${i+1}.</span> <span class="at">${a.t}</span> <span class="an">${a.n}</span></span>`).join(' → ')}</div>
    ${xlHtml}
  `;
}

// ── GRAPH ──────────────────────────────────────────────
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let gNodes = [], gEdges = [], animFrame = null;
let panX=0, panY=0, zoom=1, dragging=false, dragStart={x:0,y:0}, panStart={x:0,y:0};
let hoveredNode = null;

function resizeCanvas() {
  const rect = document.getElementById('graphZone').getBoundingClientRect();
  cv.width  = rect.width  * devicePixelRatio;
  cv.height = rect.height * devicePixelRatio;
  cv.style.width  = rect.width  + 'px';
  cv.style.height = rect.height + 'px';
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}
window.addEventListener('resize', () => { resizeCanvas(); drawGraph(); });
resizeCanvas();

// Build graph with directional tagging
function buildGraph(id) {
  const visited = new Set();
  const nodes = [], edges = [];

  function walk(wid, depth, dir) {
    if(visited.has(wid) || Math.abs(depth) > 6) return;
    visited.add(wid);
    const w = W[IDX[wid]]; if(!w) return;
    // direction relative to selected: 'up', 'sel', 'down'
    const role = wid === id ? 'sel' : depth < 0 ? 'up' : 'down';
    nodes.push({id:wid, s:w.s, role, isSel:wid===id, depth, acts:w.acts.length, tag:w.tag});
    if(dir !== 'up')   (w.down||[]).forEach(d => { edges.push({from:wid,to:d}); walk(d, depth+1, 'down'); });
    if(dir !== 'down') (w.up  ||[]).forEach(u => { edges.push({from:u,to:wid}); walk(u, depth-1, 'up');   });
  }
  walk(id, 0, 'both');
  return {nodes, edges};
}

function layoutGraph(nodes) {
  const rect = document.getElementById('graphZone').getBoundingClientRect();
  const cw = rect.width, ch = rect.height;
  const cx = cw / 2, cy = ch / 2;

  const upLayers = {}, downLayers = {};
  let selNode = null;

  nodes.forEach(n => {
    if (n.depth === 0) { selNode = n; return; }
    if (n.depth < 0) {
      const k = -n.depth;
      if (!upLayers[k]) upLayers[k] = [];
      upLayers[k].push(n);
    } else {
      if (!downLayers[n.depth]) downLayers[n.depth] = [];
      downLayers[n.depth].push(n);
    }
  });

  if (selNode) { selNode.x = cx; selNode.y = cy; }

  // --- LAYOUT EN GRILLE (LAYERED) ---
  const LAYER_WIDTH = Math.min(cw, ch) * 0.20;  // espacement horizontal entre colonnes
  const NODE_SPACING = 70;                       // espacement vertical entre nodes

  function placeLayer(layer, colIndex, direction) {
    const count = layer.length;
    const totalHeight = (count - 1) * NODE_SPACING;
    const startY = cy - totalHeight / 2;
    const xPos = direction === 'left' 
      ? cx - colIndex * LAYER_WIDTH 
      : cx + colIndex * LAYER_WIDTH;

    layer.forEach((n, i) => {
      n.x = xPos;
      n.y = startY + i * NODE_SPACING;
    });
  }

  Object.keys(upLayers).map(Number).sort().forEach(k => 
    placeLayer(upLayers[k], k, 'left')
  );
  Object.keys(downLayers).map(Number).sort().forEach(k => 
    placeLayer(downLayers[k], k, 'right')
  );
}
// Toggle formula display
document.getElementById('detailPanel').addEventListener('change', (e) => {
  if (e.target.id === 'formulaToggle') {
    const isExpanded = e.target.checked;
    document.querySelectorAll('.pill-col').forEach(pill => {
      const formula = pill.querySelector('.formula-full');
      if (formula) {
        if (isExpanded) {
          pill.classList.add('expanded');
          formula.style.display = 'block';
        } else {
          pill.classList.remove('expanded');
          formula.style.display = 'none';
        }
      }
    });
  }
});

function renderGraph(id) {
  const g = buildGraph(id);
  gNodes = g.nodes;
  gEdges = g.edges;
  layoutGraph(gNodes);
  panX = 0; panY = 0;

  if (gNodes.length > 1) {
    const rect = document.getElementById('graphZone').getBoundingClientRect();
    const xs = gNodes.map(n=>n.x), ys = gNodes.map(n=>n.y);
    const minX = Math.min(...xs)-60, maxX = Math.max(...xs)+60;
    const minY = Math.min(...ys)-40, maxY = Math.max(...ys)+40;
    const scaleX = rect.width  / (maxX - minX);
    const scaleY = rect.height / (maxY - minY);
    zoom = Math.min(scaleX, scaleY, 1.2);
    panX = (rect.width  - (maxX + minX) * zoom) / 2;
    panY = (rect.height - (maxY + minY) * zoom) / 2;
  } else {
    zoom = 1;
  }

  document.getElementById('graphLegend').style.display = gNodes.length > 1 ? 'flex' : 'none';
  drawGraph();
}

function drawGraph() {
  if(animFrame) cancelAnimationFrame(animFrame);
  animFrame = requestAnimationFrame(_drawGraph);
}

function _drawGraph() {
  const rect = document.getElementById('graphZone').getBoundingClientRect();
  const cw = rect.width, ch = rect.height;
  ctx.clearRect(0,0,cw,ch);
  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(zoom, zoom);

  const nodeMap = {};
  gNodes.forEach(n => nodeMap[n.id] = n);

  // Edges
  gEdges.forEach(e => {
    const from = nodeMap[e.from], to = nodeMap[e.to];
    if(!from || !to) return;
    ctx.beginPath();
    const mx = (from.x + to.x) / 2;
    ctx.moveTo(from.x, from.y);
    ctx.bezierCurveTo(mx, from.y, mx, to.y, to.x, to.y);
    ctx.strokeStyle = 'rgba(56,189,248,.12)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Arrow head
    const angle = Math.atan2(to.y - from.y, to.x - from.x);
    const ax = to.x - Math.cos(angle)*16, ay = to.y - Math.sin(angle)*16;
    ctx.beginPath();
    ctx.moveTo(ax + Math.cos(angle)*8,   ay + Math.sin(angle)*8);
    ctx.lineTo(ax + Math.cos(angle+2.6)*5, ay + Math.sin(angle+2.6)*5);
    ctx.lineTo(ax + Math.cos(angle-2.6)*5, ay + Math.sin(angle-2.6)*5);
    ctx.fillStyle = 'rgba(56,189,248,.25)';
    ctx.fill();
  });

  // Nodes
  gNodes.forEach(n => {
    const isHov = hoveredNode === n.id;

    // Directional color
    let col;
    if(n.isSel)        col = GCOL_SEL;
    else if(n.role==='up')   col = GCOL_UP;
    else                col = GCOL_DOWN;

    const r = n.isSel ? 14 : (isHov ? 12 : 10);

    // Glow for selected
    if(n.isSel) {
      ctx.beginPath(); ctx.arc(n.x, n.y, 24, 0, Math.PI*2);
      const grd = ctx.createRadialGradient(n.x,n.y,8,n.x,n.y,24);
      grd.addColorStop(0, col+'33'); grd.addColorStop(1,'transparent');
      ctx.fillStyle = grd; ctx.fill();
    }

    // Circle fill
    ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI*2);
    if(n.isSel) {
      ctx.fillStyle = col;
    } else {
      // dim test/old workflows
      ctx.fillStyle = (n.tag==='test'||n.tag==='old') ? col+'33' : col+'66';
    }
    ctx.fill();

    // Stroke
    ctx.strokeStyle = n.isSel ? col : col+'55';
    ctx.lineWidth   = n.isSel ? 2 : 1;
    ctx.stroke();

// Label — align based on position relative to canvas centre
    const rect2 = document.getElementById('graphZone').getBoundingClientRect();
    ctx.font      = `${n.isSel?'600':'400'} ${n.isSel?11:10}px 'IBM Plex Mono',monospace`;
    ctx.fillStyle = n.isSel ? '#fff' : (isHov ? '#fff' : '#8896aa');
    const label = n.id.length > 26 ? n.id.substring(0,24)+'..' : n.id;
    if (n.isSel) {
      ctx.textAlign = 'center';
      ctx.fillText(label, n.x, n.y + r + 14);
    } else {
      const cxApprox = rect2.width / 2;
      if (n.x < cxApprox - 20) {
        ctx.textAlign = 'right';
        ctx.fillText(label, n.x - r - 4, n.y + 3);
      } else if (n.x > cxApprox + 20) {
        ctx.textAlign = 'left';
        ctx.fillText(label, n.x + r + 4, n.y + 3);
      } else {
        ctx.textAlign = 'center';
        ctx.fillText(label, n.x, n.y + r + 14);
      }
    }

    // Step count badge
    if(n.isSel || isHov) {
      ctx.font      = '500 9px Outfit,sans-serif';
      ctx.fillStyle = n.isSel ? '#0b0f19' : '#fff';
      ctx.fillText(n.acts, n.x, n.y + 3.5);
    }
  });

  ctx.restore();
}

// Pan & Zoom
cv.onwheel = e => {
  e.preventDefault();
  zoom = Math.max(0.3, Math.min(3, zoom * (e.deltaY > 0 ? 0.9 : 1.1)));
  drawGraph();
};
cv.onmousedown = e => {
  dragging=true; dragStart={x:e.clientX,y:e.clientY}; panStart={x:panX,y:panY};
  cv.style.cursor='grabbing';
};
cv.onmousemove = e => {
  if(dragging) {
    panX = panStart.x + (e.clientX - dragStart.x);
    panY = panStart.y + (e.clientY - dragStart.y);
    drawGraph(); return;
  }
  const rect = cv.getBoundingClientRect();
  const mx = (e.clientX - rect.left - panX) / zoom;
  const my = (e.clientY - rect.top  - panY) / zoom;
  let found = null;
  for(const n of gNodes) { if(Math.hypot(n.x-mx,n.y-my)<16){found=n.id;break;} }
  if(found !== hoveredNode) {
    hoveredNode = found;
    cv.style.cursor = found ? 'pointer' : 'grab';
    drawGraph();
  }
};
cv.onmouseup = e => {
  if(dragging && Math.hypot(e.clientX-dragStart.x,e.clientY-dragStart.y)<5 && hoveredNode) selectWf(hoveredNode);
  dragging=false; cv.style.cursor = hoveredNode?'pointer':'grab';
};

// Resize handle
const resizeH = document.getElementById('resizeH');
let resizing=false, startY=0, startH=0;
resizeH.onmousedown = e => {
  resizing=true; startY=e.clientY;
  startH=document.getElementById('detailPanel').offsetHeight;
  document.body.style.cursor='ns-resize'; e.preventDefault();
};
document.onmousemove = e => {
  if(!resizing) return;
  document.getElementById('detailPanel').style.height = Math.max(100, startH-(e.clientY-startY))+'px';
  resizeCanvas(); drawGraph();
};
document.onmouseup = () => { resizing=false; document.body.style.cursor=''; };

// Init
renderList();
cv.style.cursor = 'grab';
</script>
