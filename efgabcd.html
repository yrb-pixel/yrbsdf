<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EFG QNT — Workflow GPS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap');

:root {
  --bg:#0b0f19; --s1:#111827; --s2:#1a2236; --s3:#243044;
  --bd:#2a3650; --tx:#e2e8f0; --tx2:#7b8ba3; --tx3:#4a5568;
  --acc:#38bdf8; --acc2:#818cf8; --grn:#34d399; --red:#f87171;
  --org:#fb923c; --ylw:#fbbf24; --pnk:#f472b6; --cyn:#22d3ee;
  --eq:#60a5fa; --fi:#4ade80; --etf:#c084fc; --mf:#facc15;
  --esg:#2dd4bf; --feed:#fb7185;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  background: var(--bg); color: var(--tx); 
  font-family: 'Outfit', sans-serif; height: 100vh; overflow: hidden; 
  display: flex; flex-direction: column;
}

header {
  height: 60px; background: var(--s1); border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
  z-index: 100;
}
.logo { font-family: 'IBM+Plex+Mono', monospace; font-weight: 700; font-size: 1.2rem; color: var(--acc); letter-spacing: -0.5px; }
.logo span { color: var(--tx); opacity: 0.8; }

main { flex: 1; display: flex; position: relative; overflow: hidden; }

/* Sidebar */
#sidebar {
  width: 320px; background: var(--s1); border-right: 1px solid var(--bd);
  display: flex; flex-direction: column; transition: all 0.3s ease;
}
.search-box { padding: 20px; border-bottom: 1px solid var(--bd); }
.search-box input {
  width: 100%; background: var(--s2); border: 1px solid var(--bd);
  padding: 10px 14px; border-radius: 8px; color: var(--tx); font-family: inherit;
  outline: none; transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--acc); }

.wf-list { flex: 1; overflow-y: auto; padding: 10px; }
.wf-item {
  padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 8px;
  transition: background 0.2s; border: 1px solid transparent;
}
.wf-item:hover { background: var(--s2); }
.wf-item.active { background: var(--s3); border-color: var(--acc); }
.wf-item .name { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; }
.wf-item .desc { font-size: 0.8rem; color: var(--tx2); line-height: 1.4; }

/* Canvas Area */
#viewport { flex: 1; position: relative; background: radial-gradient(circle at 2px 2px, var(--s2) 1px, transparent 0); background-size: 30px 30px; cursor: grab; }
#viewport:active { cursor: grabbing; }
canvas { display: block; }

/* Detail Panel */
#details {
  position: absolute; bottom: 20px; right: 20px; width: 400px;
  background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(10px);
  border: 1px solid var(--bd); border-radius: 12px; padding: 20px;
  box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5); transform: translateY(120%);
  transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
#details.open { transform: translateY(0); }
.tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; background: var(--s3); color: var(--acc); font-weight: 600; text-transform: uppercase; margin-right: 6px; }

</style>
</head>
<body>

<header>
  <div class="logo">EFG<span>QNT</span> — Workflow GPS</div>
  <div style="font-size: 0.8rem; color: var(--tx2);">v2.4.0 — Production Mode</div>
</header>

<main>
  <div id="sidebar">
    <div class="search-box">
      <input type="text" id="searchInp" placeholder="Rechercher un workflow..." autocomplete="off">
    </div>
    <div class="wf-list" id="wfList"></div>
  </div>

  <div id="viewport">
    <canvas id="cv"></canvas>
    
    <div id="details">
      <div style="display:flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
        <h2 id="detTitle" style="font-size: 1.2rem;">Workflow Name</h2>
        <span id="detTag" class="tag">Category</span>
      </div>
      <p id="detDesc" style="font-size: 0.9rem; color: var(--tx2); line-height: 1.5; margin-bottom: 16px;"></p>
      <div style="font-family: 'IBM Plex Mono'; font-size: 0.75rem; color: var(--acc);">
        ID: <span id="detId">---</span>
      </div>
    </div>
  </div>
</main>

<script>
const workflows = [
  { id: 'WF-01', name: 'Alpha Core Signal', cat: 'EQUITY', desc: 'Génération de signaux alpha sur les actions US Large Cap via modèles ML.', x: 200, y: 150 },
  { id: 'WF-02', name: 'Risk Parity Engine', cat: 'FI', desc: 'Optimisation de portefeuille basée sur la contribution au risque égale.', x: 500, y: 150 },
  { id: 'WF-03', name: 'LDI Hedging Tracker', cat: 'FI', desc: 'Surveillance des couvertures de passifs pour fonds de pension.', x: 500, y: 350 },
  { id: 'WF-04', name: 'ESG Score Aggregator', cat: 'ESG', desc: 'Fusion des données MSCI et Sustainalytics pour reporting interne.', x: 200, y: 350 },
  { id: 'WF-05', name: 'Backtester Pro', cat: 'CORE', desc: 'Moteur de simulation historique haute performance.', x: 350, y: 250 }
];

const edges = [
  { from: 'WF-01', to: 'WF-05' },
  { from: 'WF-02', to: 'WF-05' },
  { from: 'WF-04', to: 'WF-01' },
  { from: 'WF-05', to: 'WF-03' }
];

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const searchInp = document.getElementById('searchInp');
const wfList = document.getElementById('wfList');
const detPanel = document.getElementById('details');

let zoom = 1, panX = 0, panY = 0;
let hoveredNode = null, selectedNode = null;
let dragging = false, dragStart = { x: 0, y: 0 }, panStart = { x: 0, y: 0 };

function init() {
  window.onresize = resize;
  resize();
  renderSidebar(workflows);
  
  searchInp.oninput = () => {
    const term = searchInp.value.toLowerCase().trim();
    // CORRECTION ICI : Utilisation de includes() au lieu de RegExp pour éviter l'erreur de syntaxe
    const filtered = workflows.filter(w => 
      w.name.toLowerCase().includes(term) || 
      w.desc.toLowerCase().includes(term) ||
      w.cat.toLowerCase().includes(term)
    );
    renderSidebar(filtered);
  };

  requestAnimationFrame(draw);
}

function resize() {
  cv.width = cv.parentElement.clientWidth;
  cv.height = cv.parentElement.clientHeight;
}

function renderSidebar(list) {
  wfList.innerHTML = list.map(w => `
    <div class="wf-item ${selectedNode === w.id ? 'active' : ''}" onclick="selectWf('${w.id}')">
      <div class="name">${w.name}</div>
      <div class="desc">${w.desc.substring(0, 60)}...</div>
    </div>
  `).join('');
}

function selectWf(id) {
  selectedNode = id;
  const wf = workflows.find(n => n.id === id);
  if(!wf) return;
  
  // Update Detail Panel
  document.getElementById('detTitle').innerText = wf.name;
  document.getElementById('detDesc').innerText = wf.desc;
  document.getElementById('detTag').innerText = wf.cat;
  document.getElementById('detId').innerText = wf.id;
  detPanel.classList.add('open');
  
  // Center on node
  panX = (cv.width / 2) - (wf.x * zoom);
  panY = (cv.height / 2) - (wf.y * zoom);
  
  renderSidebar(workflows);
}

function draw() {
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(zoom, zoom);

  // Draw Edges
  ctx.strokeStyle = '#2a3650';
  ctx.lineWidth = 2;
  edges.forEach(edge => {
    const from = workflows.find(n => n.id === edge.from);
    const to = workflows.find(n => n.id === edge.to);
    if(!from || !to) return;
    ctx.beginPath();
    ctx.moveTo(from.x, from.y);
    ctx.lineTo(to.x, to.y);
    ctx.stroke();
  });

  // Draw Nodes
  workflows.forEach(n => {
    const isSel = selectedNode === n.id;
    const isHov = hoveredNode === n.id;
    
    ctx.fillStyle = isSel ? '#38bdf8' : (isHov ? '#1e293b' : '#111827');
    ctx.strokeStyle = isSel ? '#fff' : '#2a3650';
    ctx.lineWidth = isSel ? 3 : 2;
    
    ctx.beginPath();
    ctx.roundRect(n.x - 60, n.y - 20, 120, 40, 8);
    ctx.fill();
    ctx.stroke();
    
    ctx.fillStyle = isSel ? '#0b0f19' : '#e2e8f0';
    ctx.font = '500 11px Outfit';
    ctx.textAlign = 'center';
    ctx.fillText(n.name, n.x, n.y + 4);
  });

  ctx.restore();
  requestAnimationFrame(draw);
}

// Interactivité Canvas
cv.onmousedown = e => {
  dragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  panStart = { x: panX, y: panY };
};

cv.onmousemove = e => {
  const rect = cv.getBoundingClientRect();
  const mx = (e.clientX - rect.left - panX) / zoom;
  const my = (e.clientY - rect.top - panY) / zoom;
  
  if(dragging) {
    panX = panStart.x + (e.clientX - dragStart.x);
    panY = panStart.y + (e.clientY - dragStart.y);
  } else {
    // Detection de survol
    hoveredNode = null;
    workflows.forEach(n => {
      if(mx > n.x - 60 && mx < n.x + 60 && my > n.y - 20 && my < n.y + 20) {
        hoveredNode = n.id;
      }
    });
    cv.style.cursor = hoveredNode ? 'pointer' : 'grab';
  }
};

cv.onmouseup = e => {
  if(dragging && Math.hypot(e.clientX-dragStart.x, e.clientY-dragStart.y) < 5) {
    if(hoveredNode) selectWf(hoveredNode);
    else detPanel.classList.remove('open');
  }
  dragging = false;
};

cv.onwheel = e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  zoom *= delta;
  zoom = Math.min(Math.max(0.5, zoom), 3);
};

init();
</script>

</body>
</html>
